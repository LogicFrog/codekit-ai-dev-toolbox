spring:
  application:
    name: codekit
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${CODEKIT_DB_URL:jdbc:mysql://localhost:3306/codekit?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${CODEKIT_DB_USERNAME:}
    password: ${CODEKIT_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${CODEKIT_REDIS_HOST:localhost}
      port: ${CODEKIT_REDIS_PORT:6379}
      database: ${CODEKIT_REDIS_DATABASE:0}
      password: ${CODEKIT_REDIS_PASSWORD:}

codekit:
  watch:
    enabled: ${CODEKIT_WATCH_ENABLED:true}
    path: ${CODEKIT_WATCH_PATH:}
    interval: ${CODEKIT_WATCH_INTERVAL:5000}
  fs:
    workspace-root: ${CODEKIT_WORKSPACE_ROOT:}

ai:
  provider: ${CODEKIT_AI_PROVIDER:mock}
  api-key: ${CODEKIT_AI_API_KEY:}
  model: ${CODEKIT_AI_MODEL:}
  base-url: ${CODEKIT_AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
  timeout: ${CODEKIT_AI_TIMEOUT:30000}
  max-tokens: ${CODEKIT_AI_MAX_TOKENS:2048}
